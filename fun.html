    <!-- Page Header -->

    <!-- Fun Content with Alternating Pattern -->
    <section class="content-section">
        <div class="container">
            <h2>Blog</h2>
            <div id="blog-list">
                <!-- Blog posts will be dynamically loaded here -->
            </div>
            <div style="margin-top:32px;">
                <h3>Submit a New Blog</h3>
                <form id="blogForm">
                    <input type="text" id="blogTitle" placeholder="Blog Title" required style="width:100%;margin-bottom:8px;">
                    <textarea id="blogContent" placeholder="Blog Content" rows="4" required style="width:100%;margin-bottom:8px;"></textarea>
                    <input type="url" id="blogLink" placeholder="Optional Link (e.g. YouTube, article)" style="width:100%;margin-bottom:8px;">
                    <button type="submit" class="btn btn-primary">Post Blog</button>
                </form>
            </div>
        </div>
        <script>
        // Blog storage (local for demo)
        let blogs = JSON.parse(localStorage.getItem('blogs') || '[]');
        function renderBlogs() {
            const blogList = document.getElementById('blog-list');
            blogList.innerHTML = '';
            blogs.slice().reverse().forEach(blog => {
                let linkPreview = '';
                if(blog.link) {
                    // YouTube video or playlist thumbnail
                    if(blog.link.includes('youtube.com') || blog.link.includes('youtu.be')) {
                        let videoId = '';
                        // Playlist
                        if(blog.link.includes('list=')) {
                            let listId = blog.link.split('list=')[1].split('&')[0];
                            // Try to extract the first video ID from the URL (if present)
                            if(blog.link.includes('v=')) {
                                videoId = blog.link.split('v=')[1].split('&')[0];
                                linkPreview = `<div style='margin-top:8px;'><img src='https://img.youtube.com/vi/${videoId}/0.jpg' style='width:320px;border-radius:8px;'><br><a href='${blog.link}' target='_blank'>View Playlist</a></div>`;
                            } else {
                                // Fallback: show playlist icon if no video ID
                                linkPreview = `<div style='margin-top:8px;'><img src='https://www.gstatic.com/youtube/img/creator/yt_creator_32x32.png' style='width:80px;border-radius:8px;opacity:0.7;'><br><a href='${blog.link}' target='_blank'>View Playlist</a><br><span style='color:#888;font-size:0.9em;'>Playlist preview unavailable</span></div>`;
                            }
                        } else {
                            // Single video
                            videoId = blog.link.split('v=')[1] || blog.link.split('/').pop();
                            if(videoId && videoId.length > 0) {
                                videoId = videoId.split('&')[0];
                                linkPreview = `<div style='margin-top:8px;'><img src='https://img.youtube.com/vi/${videoId}/0.jpg' style='width:320px;border-radius:8px;'><br><a href='${blog.link}' target='_blank'>View Video</a></div>`;
                            }
                        }
                    } else {
                        linkPreview = `<div style='margin-top:8px;'><a href='${blog.link}' target='_blank'>View Link</a></div>`;
                    }
                }
                // Add date to each blog
                let dateStr = blog.date ? new Date(blog.date).toLocaleString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
                blogList.innerHTML += `
                    <div class='fun-item' style='margin-bottom:24px;'>
                        <div class='fun-text'>
                            <h3>${blog.title}</h3>
                            <p style='color:#888;font-size:0.95em;'>${dateStr}</p>
                            <p>${blog.content}</p>
                            ${linkPreview}
                        </div>
                    </div>
                `;
            });
        }
        renderBlogs();
        document.getElementById('blogForm').onsubmit = function(e) {
            e.preventDefault();
            const title = document.getElementById('blogTitle').value;
            const content = document.getElementById('blogContent').value;
            const link = document.getElementById('blogLink').value;
            const date = new Date().toISOString();
            blogs.push({title, content, link, date});
            localStorage.setItem('blogs', JSON.stringify(blogs));
            renderBlogs();
            this.reset();
        };
        </script>
        </div>
    </section>

</body>
